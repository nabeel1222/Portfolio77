<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Online Portfolio</title>

<style>
body {
    font-family: Arial, sans-serif;
    margin: 0;
    background: #f5f5f5;
    color: #333;
}

header {
    background: #1a1a1a;
    color: #fff;
    padding: 30px;
    text-align: center;
}

section {
    max-width: 800px;
    margin: 40px auto;
    padding: 0 20px;
}

h2 {
    color: #1a1a1a;
    border-bottom: 2px solid #ff6600;
    display: inline-block;
    padding-bottom: 5px;
}

.skills ul {
    list-style: none;
    padding: 0;
}

.skills li {
    background: #ff6600;
    color: #fff;
    display: inline-block;
    margin: 5px 10px 5px 0;
    padding: 5px 15px;
    border-radius: 20px;
}

.skill {
    margin-bottom: 15px;
}

.skill-bar {
    background: #ddd;
    border-radius: 20px;
    overflow: hidden;
}

.skill-bar-fill {
    height: 10px;
    width: 0;
    background: #ff6600;
    transition: width 1s ease-in-out;
}

.contact form {
    display: flex;
    flex-direction: column;
}

.contact input,
.contact textarea {
    padding: 12px;
    margin-bottom: 15px;
    border-radius: 8px;
    border: 1px solid #ccc;
}

.contact button {
    padding: 12px;
    background: #ff6600;
    color: #fff;
    border: none;
    border-radius: 8px;
    cursor: pointer;
}

.contact button:hover {
    background: #e65c00;
}

#output {
    margin-top: 20px;
}

.submission-card {
    background: #fff;
    padding: 15px;
    border-radius: 10px;
    margin-top: 10px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}
</style>
</head>

<body>

<header>
    <h1>Nabeel Burhan</h1>
    <p>Web Developer | Student</p>
</header>

<section class="about">
    <h2>About Me</h2>
    <p>I am a beginner learning web development and building projects to improve my skills.</p>
</section>

<section class="skills" id="skills">
    <h2>My Skills</h2>

    <div class="skill">
        <p>HTML</p>
        <div class="skill-bar">
            <div class="skill-bar-fill" data-fill="90%"></div>
        </div>
    </div>

    <div class="skill">
        <p>CSS</p>
        <div class="skill-bar">
            <div class="skill-bar-fill" data-fill="85%"></div>
        </div>
    </div>

    <div class="skill">
        <p>JavaScript</p>
        <div class="skill-bar">
            <div class="skill-bar-fill" data-fill="80%"></div>
        </div>
    </div>
</section>

<section class="contact">
    <h2>Contact Me</h2>

    <form id="contactForm">
        <input type="text" id="name" placeholder="Your Name" required>
        <input type="email" id="email" placeholder="Your Email" required>
        <textarea id="message" placeholder="Your Message"></textarea>
        <button type="submit">Send</button>
    </form>

    <div id="output">
        <h3>Saved Submissions:</h3>
    </div>
</section>

<script>
document.addEventListener("DOMContentLoaded", () => {

    const form = document.getElementById("contactForm");
    const output = document.getElementById("output");

    const saved = JSON.parse(localStorage.getItem("submissions")) || [];
    saved.forEach(entry => addToUI(entry.name, entry.email, entry.message));

    form.addEventListener("submit", async (e) => {
        e.preventDefault();

        const name = document.getElementById("name").value.trim();
        const email = document.getElementById("email").value.trim();
        const message = document.getElementById("message").value.trim();

        if (!name || !email) return;

        let submissions = JSON.parse(localStorage.getItem("submissions")) || [];
        submissions.push({ name, email, message });
        localStorage.setItem("submissions", JSON.stringify(submissions));

        addToUI(name, email, message);

        try {
            await fetch("/submit", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ name, email, message })
            });
        } catch (err) {
            console.log(err);
        }

        form.reset();
    });

    function addToUI(name, email, message) {
        const card = document.createElement("div");
        card.className = "submission-card";
        card.innerHTML = `
            <h4>${name}</h4>
            <p><strong>Email:</strong> ${email}</p>
            <p><strong>Message:</strong> ${message}</p>
        `;
        output.appendChild(card);
    }

    const skillFills = document.querySelectorAll(".skill-bar-fill");

    function animateSkills() {
        skillFills.forEach(fill => {
            fill.style.width = fill.getAttribute("data-fill");
        });
    }

    window.addEventListener("scroll", () => {
        const skillsSection = document.getElementById("skills");
        const sectionTop = skillsSection.getBoundingClientRect().top;
        if (sectionTop < window.innerHeight - 100) {
            animateSkills();
        }
    });
});
</script>

</body>
</html>
